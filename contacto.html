<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Contacto - Videojuegos 3D</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header p-3 bg-dark d-flex justify-content-between align-items-center">
    <h1 class="text-info">Videojuegos 3D</h1>
    <nav>
        <a href="index.html" class="text-white fw-bold me-3" onclick="reproducirSonido(event,'index.html')">Inicio</a>
        <a href="motores.html" class="text-white fw-bold me-3" onclick="reproducirSonido(event,'motores.html')">Motores</a>
        <a href="modelado.html" class="text-white fw-bold me-3" onclick="reproducirSonido(event,'modelado.html')">Modelado</a>
        <a href="programacion.html" class="text-white fw-bold me-3" onclick="reproducirSonido(event,'programacion.html')">Programación</a>
        <a href="recursos.html" class="text-white fw-bold me-3" onclick="reproducirSonido(event,'recursos.html')">Recursos</a>
        <a href="contacto.html" class="text-white fw-bold" onclick="reproducirSonido(event,'contacto.html')">Contacto</a>
    </nav>
</header>

<section class="text-center py-5 bg-dark text-light">
    <h2 class="text-info mb-3">Contacto</h2>
    <p>Si tienes dudas o quieres enviarnos un mensaje, rellena el formulario abajo.</p>
</section>

<section class="container py-5 mb-5">
    <div class="card bg-dark text-light p-4 mx-auto" style="max-width:600px; border-radius:15px;">
        <form id="formContacto">
            <label for="email" class="form-label text-info fw-bold">Correo electrónico:</label>
            <input type="email" class="form-control mb-3" name="email" id="email" placeholder="tuemail@ejemplo.com" required>

            <label for="mensaje" class="form-label text-info fw-bold">Mensaje:</label>
            <textarea class="form-control mb-3" name="mensaje" id="mensaje" rows="5" placeholder="Escribe tu mensaje aquí" required></textarea>

            <button type="submit" class="btn btn-info text-dark fw-bold w-100">Enviar</button>
        </form>
    </div>
</section>

<section class="text-center py-4 bg-dark text-light">
    <h3 class="text-info">¿Necesitas ayuda?</h3>
    <p>Puedes enviarnos un correo directamente a: <strong>sergiojr072008@gmail.com</strong></p>
</section>

<audio id="sonidoClick" src="media/click.mp3"></audio>

<script>
function reproducirSonido(event, destino) {
    event.preventDefault();
    document.body.classList.add("fade-out");

    const audio = document.getElementById("sonidoClick");
    if(audio) audio.play().catch(()=>{});

    setTimeout(() => {
        window.location.href = destino;
    }, 400);
}

document.getElementById("formContacto").addEventListener("submit", function(e){
    e.preventDefault();
    alert("¡Correo enviado correctamente! Gracias por contactarnos.");
    this.reset();
});
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
